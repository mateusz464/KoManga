# KoManga stack: `suwayomi` + `api` + optional `cloudflared`. By default the
# stack runs local-only; `cloudflared` is opt-in via the `tunnel` profile
# (`docker compose --profile tunnel up -d`). Suwayomi has no default host/public
# port. RFC §9/§10 allow only owner-authenticated admin WebUI reachability through
# Cloudflare Access. Kobo clients still only use the API.

services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: komanga-suwayomi
    restart: unless-stopped
    networks:
      - komanga
    # No default published ports: Kobo/content traffic reaches Suwayomi only
    # in-network, via the `suwayomi` hostname. Owner admin WebUI access is
    # reconciled in RFC §9/§10 and may be routed through Cloudflare only behind
    # Access, or through explicit loopback-only host access for local maintenance.
    expose:
      - "4567"
    volumes:
      - suwayomi-data:/home/suwayomi/.local/share/Tachidesk
    healthcheck:
      # Image ships curl, not wget.
      test: ["CMD", "curl", "-fsS", "http://localhost:4567/api/v1/settings/about"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  api:
    build:
      context: ./api
    container_name: komanga-api
    restart: unless-stopped
    depends_on:
      suwayomi:
        # Don't start the API until Suwayomi passes its healthcheck — the
        # composition root opens a Suwayomi connection at startup.
        condition: service_healthy
    networks:
      - komanga
    environment:
      # Content/reading traffic reaches Suwayomi by its in-network service name,
      # never by a Kobo-visible public URL.
      SUWAYOMI_URL: http://suwayomi:4567
      # Single-user secret — supplied from the host environment / `.env`, never
      # committed (CLAUDE.md §5/§9). Compose fails fast if it is unset.
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN must be set (see api/.env.example)}
      # AniList OAuth app credentials — the secret stays server-side and is used
      # only for code→token exchange during account linking. The redirect URI
      # must be on the existing API hostname routed by cloudflared, for example
      # https://manga.example.com/api/tracker/anilist/callback; no separate
      # callback hostname is needed. QR linking completes only while that public
      # API route is reachable.
      ANILIST_CLIENT_ID: ${ANILIST_CLIENT_ID:?ANILIST_CLIENT_ID must be set (see api/.env.example)}
      ANILIST_CLIENT_SECRET: ${ANILIST_CLIENT_SECRET:?ANILIST_CLIENT_SECRET must be set (see api/.env.example)}
      ANILIST_REDIRECT_URI: ${ANILIST_REDIRECT_URI:?ANILIST_REDIRECT_URI must be set (see api/.env.example)}
      PORT: "3000"
      # Persistent paths point at the named volumes mounted below.
      DATABASE_PATH: /data/db/komanga.sqlite
      CBZ_STORE_PATH: /data/downloads
    # Published on all host interfaces so LAN clients (e.g. the Kobo on the local
    # network) can reach the API directly. This is a deliberate divergence from
    # the RFC §9 loopback-only default; it exposes the AUTH_TOKEN-gated API to the
    # LAN (not the public internet — no router ports are forwarded). The Cloudflare
    # Tunnel (API-802) remains the public entrypoint.
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      # Our SQLite DB (reading progress, downloads, library — RFC §7).
      - api-data:/data/db
      # Persistent CBZ download store, separate from the ephemeral session cache
      # and never auto-pruned (RFC §5.2/§7).
      - cbz-store:/data/downloads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  tunnel-preflight:
    # Fail-fast guard for a missing token. This can't be a `${TUNNEL_TOKEN:?}` on
    # cloudflared: Compose interpolates the whole file before applying profiles,
    # so that guard would also break a tokenless local-only `up`. cloudflared
    # depends on this completing, so under `--profile tunnel` a blank token here
    # blocks the connector and fails the `up`.
    image: busybox:stable
    container_name: komanga-tunnel-preflight
    profiles:
      - tunnel
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command:
      - sh
      - -c
      - >-
        test -n "$$CLOUDFLARE_TUNNEL_TOKEN" ||
        { echo "CLOUDFLARE_TUNNEL_TOKEN must be set for the tunnel profile (see .env.example and docs/cloudflare-tunnel.md)" >&2; exit 1; }
    restart: "no"

  cloudflared:
    # The Cloudflare Tunnel connector — an OPT-IN public entrypoint (RFC §9/§10).
    # It dials OUT to Cloudflare's edge and proxies requests back over the
    # internal network, so no inbound ports are opened on the home router and the
    # home IP stays hidden. TLS is terminated at the Cloudflare edge.
    image: cloudflare/cloudflared:latest
    container_name: komanga-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    # `tunnel run` with a token is a remotely-managed tunnel: the public
    # hostname → service mapping lives in the Cloudflare Zero Trust dashboard.
    # Remote config routes the Kobo/API hostname to http://api:3000. That same
    # hostname also receives the AniList OAuth callback path
    # /api/tracker/anilist/callback; create no extra callback hostname. Remote
    # config may also route a separate Suwayomi admin WebUI hostname to
    # http://suwayomi:4567, protected by an owner-only Cloudflare Access policy.
    command: tunnel --no-autoupdate run
    depends_on:
      api:
        # Only dial out once the API is healthy, so the first proxied request
        # doesn't hit a cold/booting upstream.
        condition: service_healthy
      suwayomi:
        # The remotely-managed tunnel may route the admin WebUI to Suwayomi, so
        # ensure that target is healthy before the connector registers.
        condition: service_healthy
      tunnel-preflight:
        condition: service_completed_successfully
    networks:
      - komanga
    environment:
      # Credential from `.env`, never committed (CLAUDE.md §5/§9). Defaulted empty
      # so a tokenless local-only `up` doesn't trip a mandatory-variable error;
      # tunnel-preflight enforces it is set under the profile.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # No `ports:` — the connector is outbound-only. cloudflared reaches services
    # by in-network names. Any Suwayomi WebUI route must be owner-only behind
    # Access.

# A plain bridge, not `internal: true`: Suwayomi needs outbound internet to
# scrape sources; it just has no inbound port mapping to the host.
networks:
  komanga:
    driver: bridge

volumes:
  suwayomi-data:
  # Our SQLite database — survives container restarts/rebuilds (RFC §7).
  api-data:
  # Persistent CBZ download store (RFC §5.2/§7) — explicit downloads the user
  # chose to keep, physically separate from the ephemeral session cache and
  # never auto-pruned. Mounted by the `api` service at CBZ_STORE_PATH.
  cbz-store:
