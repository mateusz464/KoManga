# KoManga stack: `suwayomi` (internal-only) + `api` + `cloudflared` (the public
# entrypoint). Suwayomi is never reachable from the host or the internet; the
# only public surface is the API, fronted by the Cloudflare Tunnel (RFC §9/§10).

services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: komanga-suwayomi
    restart: unless-stopped
    networks:
      - komanga
    # No published ports: Suwayomi must never be reachable from the host's
    # public interface (RFC §9) — only in-network, via the `suwayomi` hostname.
    expose:
      - "4567"
    volumes:
      - suwayomi-data:/home/suwayomi/.local/share/Tachidesk
    healthcheck:
      # Image ships curl, not wget.
      test: ["CMD", "curl", "-fsS", "http://localhost:4567/api/v1/settings/about"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  api:
    build:
      context: ./api
    container_name: komanga-api
    restart: unless-stopped
    depends_on:
      suwayomi:
        # Don't start the API until Suwayomi passes its healthcheck — the
        # composition root opens a Suwayomi connection at startup.
        condition: service_healthy
    networks:
      - komanga
    environment:
      # Suwayomi is reached by its in-network service name, never publicly.
      SUWAYOMI_URL: http://suwayomi:4567
      # Single-user secret — supplied from the host environment / `.env`, never
      # committed (CLAUDE.md §5/§9). Compose fails fast if it is unset.
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN must be set (see api/.env.example)}
      PORT: "3000"
      # Persistent paths point at the named volumes mounted below.
      DATABASE_PATH: /data/db/komanga.sqlite
      CBZ_STORE_PATH: /data/downloads
    # Published to loopback only so the host can reach it for local checks; the
    # public entrypoint is the Cloudflare Tunnel (API-802), and loopback opens
    # no inbound router ports (RFC §9).
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Our SQLite DB (reading progress, downloads, library — RFC §7).
      - api-data:/data/db
      # Persistent CBZ download store, separate from the ephemeral session cache
      # and never auto-pruned (RFC §5.2/§7).
      - cbz-store:/data/downloads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  cloudflared:
    # The Cloudflare Tunnel connector — the stack's only public entrypoint
    # (RFC §9/§10). It dials OUT to Cloudflare's edge and proxies requests back
    # to the API over the internal network, so no inbound ports are opened on
    # the home router and the home IP stays hidden. TLS is terminated at the
    # Cloudflare edge.
    image: cloudflare/cloudflared:latest
    container_name: komanga-cloudflared
    restart: unless-stopped
    # `tunnel run` with a token is a remotely-managed tunnel: the public
    # hostname → service mapping lives in the Cloudflare Zero Trust dashboard
    # (set it to http://api:3000), so no local config file is needed.
    command: tunnel --no-autoupdate run
    depends_on:
      api:
        # Only dial out once the API is healthy, so the first proxied request
        # doesn't hit a cold/booting upstream.
        condition: service_healthy
    networks:
      - komanga
    environment:
      # Connector credential from the host environment / `.env`, never committed
      # (CLAUDE.md §5/§9). Compose fails fast if it is unset. Generate it in the
      # Cloudflare Zero Trust dashboard when creating the tunnel.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set (see .env.example and docs/cloudflare-tunnel.md)}
    # No `ports:` — the connector is outbound-only. cloudflared reaches the API
    # by its in-network name (`api:3000`); it is NOT configured to route to
    # Suwayomi, which therefore stays unreachable from the internet.

# A plain bridge, not `internal: true`: Suwayomi needs outbound internet to
# scrape sources; it just has no inbound port mapping to the host.
networks:
  komanga:
    driver: bridge

volumes:
  suwayomi-data:
  # Our SQLite database — survives container restarts/rebuilds (RFC §7).
  api-data:
  # Persistent CBZ download store (RFC §5.2/§7) — explicit downloads the user
  # chose to keep, physically separate from the ephemeral session cache and
  # never auto-pruned. Mounted by the `api` service at CBZ_STORE_PATH.
  cbz-store:
