# LOCAL-ONLY override — NOT for production. Exposes the API on the LAN so a
# physical Kobo can reach it for on-device testing (e.g. KRP-503). The base
# compose deliberately binds the API to loopback (RFC §9); this relaxes that to
# all interfaces on the dev machine only. Delete this file to restore
# loopback-only. Suwayomi stays internal — it is not touched here.
services:
  api:
    # !override replaces the base ports list instead of appending to it, so the
    # loopback-only binding is dropped rather than kept alongside this one.
    ports: !override
      - "0.0.0.0:3000:3000"
